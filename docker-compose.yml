version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ragdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  rag-system:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://user:${POSTGRES_PASSWORD:-password}@db:5432/ragdb?sslmode=disable"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
